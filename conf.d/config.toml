# MIB-Agent 配置文件

[global]
# MIB 文件搜索目录
mib_dirs = ["./mibs", "/usr/share/snmp/mibs", "/var/lib/snmp/mibs"]

# 全局标签
[global.labels]
env = "production"
region = "cn-east-1"

[log]
level = "info"
output = "stdout"

[ai]
enabled = true
model_priority = ["deepseek", "gpt4o"]

[ai.models.deepseek]
base_url = "https://api.deepseek.com/v1"
api_key = "${DEEPSEEK_API_KEY}"
model = "deepseek-chat"

[ai.models.gpt4o]
base_url = "https://api.openai.com/v1"
api_key = "${OPENAI_API_KEY}"
model = "gpt-4o"

[ai.mcp]
enabled = false
# 配置 MCP 服务器用于扩展功能
# [[ai.mcp.servers]]
# name = "filesystem"
# command = "/usr/local/bin/mcp-filesystem"
# args = ["/path/to/mibs"]

[mib]
cache_dir = "./mib_cache"
auto_load = true
parse_timeout = 30

[generator]
output_dir = "./output"
default_community = "public"
default_version = 2
default_interval = "30s"

# ===========================================
# Agent 模式配置
# ===========================================
[agent]
enabled = true
check_interval = "30s"
auto_diagnose = true

[agent.labels]
instance = "mibcraft-agent-01"

# Agent 插件配置示例
# [agent.plugins.snmp]
# enabled = true
# targets = ["192.168.1.1:161"]
# community = "public"
# version = 2

# [agent.plugins.mib_validator]
# enabled = true
# mib_dirs = ["./mibs"]

# [agent.plugins.oid_monitor]
# enabled = false

# [agent.plugins.config_gen]
# enabled = false
# watch_changes = true

# ===========================================
# 通知配置
# ===========================================

# 控制台通知（默认启用）
[notify.console]
enabled = true
color = true

# WebAPI 通知
# [notify.webapi]
# enabled = false
# url = "https://your-webhook.example.com/alert"
# method = "POST"
# timeout = "10s"
# [notify.webapi.headers]
# Authorization = "Bearer ${WEBAPI_TOKEN}"

# Flashduty 通知
# [notify.flashduty]
# enabled = false
# integration_key = "your-integration-key"

# PagerDuty 通知
