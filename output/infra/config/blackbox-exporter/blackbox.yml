# Blackbox Exporter 配置
# 由 mibcraft 自动生成

modules:
  http_2xx:
    prober: http
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 301, 302]
      method: GET
      follow_redirects: true
      fail_if_ssl: false
      fail_if_not_ssl: false
      tls_config:
        insecure_skip_verify: true
      preferred_ip_protocol: "ip4"

  http_2xx_check_ssl:
    prober: http
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 301, 302]
      method: GET
      fail_if_ssl: false
      fail_if_not_ssl: true
      preferred_ip_protocol: "ip4"

  icmp:
    prober: icmp
    icmp:
      preferred_ip_protocol: "ip4"
      payload_size: 56

  tcp_connect:
    prober: tcp
    tcp:
      preferred_ip_protocol: "ip4"

  dns_udp:
    prober: dns
    dns:
      transport_protocol: "udp"
      preferred_ip_protocol: "ip4"
      query_name: "."
      query_type: "NS"
