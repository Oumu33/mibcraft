# vmagent 配置文件
# 由 mibcraft 自动生成

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: 'monitoring-cluster'
    environment: 'production'
    datacenter: 'dc1'

scrape_configs:
  # VictoriaMetrics 自监控
  - job_name: 'victoriametrics'
    static_configs:
      - targets: ['victoriametrics:8428']

  # vmagent 自监控
  - job_name: 'vmagent'
    static_configs:
      - targets: ['vmagent:8429']

  # Node Exporter
  - job_name: 'node-exporter'
    file_sd_configs:
      - files:
        - /etc/prometheus/targets/node-exporters.json
        refresh_interval: 60s

  # SNMP 设备监控
  - job_name: 'snmp'
    scrape_interval: 30s
    scrape_timeout: 20s
    metrics_path: /snmp
    params:
      module: [if_mib]
    file_sd_configs:
      - files:
        - /etc/prometheus/targets/snmp-devices.json
        refresh_interval: 60s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116

  # Blackbox HTTP 探测
  - job_name: 'blackbox-http'
    scrape_interval: 30s
    metrics_path: /probe
    params:
      module: [http_2xx]
    file_sd_configs:
      - files:
        - /etc/prometheus/targets/blackbox-http.json
        refresh_interval: 60s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Blackbox ICMP 探测
  - job_name: 'blackbox-icmp'
    scrape_interval: 30s
    metrics_path: /probe
    params:
      module: [icmp]
    file_sd_configs:
      - files:
        - /etc/prometheus/targets/blackbox-icmp.json
        refresh_interval: 60s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Redfish 硬件监控
  - job_name: 'redfish'
    scrape_interval: 60s
    metrics_path: /redfish
    static_configs:
      - targets: ['dell-r740-01']
        labels:
          instance: 'dell-r740-01'
          vendor: 'dell_idrac'
      - targets: ['hpe-dl360-01']
        labels:
          instance: 'hpe-dl360-01'
          vendor: 'hpe_ilo'
      - targets: ['lenovo-sr650-01']
        labels:
          instance: 'lenovo-sr650-01'
          vendor: 'lenovo_xclarity'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __address__
        replacement: redfish-exporter:9610

  # IPMI 硬件监控
  - job_name: 'ipmi'
    scrape_interval: 60s
    metrics_path: /ipmi
    static_configs:
      - targets: ['192.168.3.10']
        labels:
          instance: 'old-server-01'
          vendor: 'generic'
      - targets: ['192.168.3.11']
        labels:
          instance: 'old-server-02'
          vendor: 'dell'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: ipmi-exporter:9290

