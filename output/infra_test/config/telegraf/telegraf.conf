# Telegraf VMware vSphere 监控配置
# 由 mibcraft 自动生成

[agent]
  interval = "60s"
  round_interval = true

[[outputs.http]]
  url = "http://victoriametrics:8428/api/v1/write"
  data_format = "prometheusremotewrite"

[[inputs.vsphere]]
  vcenters = [""]
  username = "monitoring@vsphere.local"
  password = "YourPassword123!"
  insecure_skip_verify = false
  interval = "60s"

  vm_metric_include = [
    "cpu.usage.average",
    "mem.usage.average",
    "disk.usage.average",
    "net.usage.average",
  ]

  host_metric_include = [
    "cpu.usage.average",
    "mem.usage.average",
  ]

  [inputs.vsphere.tags]
    env = "production"
    region = "cn-east-1"
    vcenter = "vcenter-main"

