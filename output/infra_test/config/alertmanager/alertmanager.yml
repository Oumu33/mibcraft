# Alertmanager 配置
# 由 mibcraft 自动生成

global:
  smtp_smarthost: '${SMTP_HOST}:${SMTP_PORT}'
  smtp_from: '${SMTP_FROM}'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

route:
  receiver: 'email-ops'
  group_by: ['alertname', 'severity', 'device_tier']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: 'email-ops'
    email_configs:
      - to: '${ALERT_EMAIL}'
        headers:
          Subject: '[{{ .Status }}] {{ .GroupLabels.alertname }}'

inhibit_rules:
  # 主机宕机 -> 抑制该主机的所有其他告警
  - source_match:
      alertname: 'HostDown'
    target_match_re:
      instance: '.*'
    equal: ['instance']

  # 核心交换机故障 -> 抑制下游接入交换机告警
  - source_match:
      device_tier: 'core'
      alertname: 'SwitchDown'
    target_match:
      device_tier: 'access'
    equal: ['datacenter']
